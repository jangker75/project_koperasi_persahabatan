version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koperasi_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - koperasi_network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:alpine
    container_name: koperasi_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - koperasi_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: koperasi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_rs_koperasi
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: koperasi
    ports:
      - "3307:3306"
    volumes:
      - koperasi_db_data:/var/lib/mysql
    networks:
      - koperasi_network

  redis:
    image: redis:alpine
    container_name: koperasi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - koperasi_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: koperasi_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - koperasi_network

networks:
  koperasi_network:
    driver: bridge

volumes:
  koperasi_db_data:
    driver: local
