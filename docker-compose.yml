services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koperasi_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - koperasi_network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:1.24-alpine
    container_name: koperasi_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - koperasi_network
    depends_on:
      - app

  db:
    image: mysql:8.0.36
    container_name: koperasi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_rs_koperasi
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_ROOT_HOST: '%'
      MYSQL_PASSWORD: secret
      MYSQL_USER: koperasi
    ports:
      - "3307:3306"
    volumes:
      - ./koperasi/mysql:/var/lib/mysql
      - ./docker/databases/01-init-database.sql:/docker-entrypoint-initdb.d/01-init-database.sql
    networks:
      - koperasi_network

  redis:
    image: redis:7.2-alpine
    container_name: koperasi_redis
    restart: unless-stopped
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6377:6379"
    volumes:
      - ./koperasi/redis:/data
    networks:
      - koperasi_network
    deploy:
      resources:
        limits:
          memory: 1G

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: koperasi_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - koperasi_network

networks:
  koperasi_network:
    driver: bridge
